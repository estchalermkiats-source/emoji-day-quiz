<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emoji Quiz เซียนขั้นสุด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght=500;700;800&family=Sarabun:wght=400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ============================================================
   EMOJI QUIZ เซียนขั้นสุด (Slack Version)
   ============================================================ */

const QUESTIONS = [
  { id: 1, emojis: "👀 🐘 💩 ➡️ 👤 💩", answers: ["เห็นช้างขี้ขี้ตามช้าง"], hint: "ทำเลียนแบบคนใหญ่คนโตหรือคนรวยทั้งที่ตนไม่มีกำลังทรัพย์" },
  { id: 2, emojis: "🍽️ 🛖 ➡️ 🏃‍♂️ 💩 🏠", answers: ["กินบนเรือนขี้บนหลังคา"], hint: "เนรคุณคนอื่นที่คอยช่วยเหลือหรือให้ที่พักอาศัย" },
  { id: 3, emojis: "🖐️ ❌ 🚣‍♂️ ➡️ 🦶 💦 🛶", answers: ["มือไม่พายเอาเท้าราน้ำ"], hint: "ไม่ช่วยทำงานแล้วยังทำตัวขัดขวางการทำงานของผู้อื่น" },
  { id: 4, emojis: "🪵 🥣 🌶️ 🫗 ➡️ 🌊", answers: ["ตำน้ำพริกละลายแม่น้ำ"], hint: "ลงทุนไปเป็นจำนวนมากแต่กลับได้ผลประโยชน์ไม่คุ้มค่า" },
  { id: 5, emojis: "🎻 🎶 🐃 👂 💤", answers: ["สีซอให้ควายฟัง"], hint: "สั่งสอนหรือแนะนำสิ่งดีๆ ให้คนที่ไม่สนใจฟังก็ไม่มีประโยชน์" },
  { id: 6, emojis: "🤾‍♂️ 🐍 ➡️ 🧣 🧔", answers: ["หมองูตายเพราะงู", "จับงูข้างหาง"], hint: "มีความชำนาญในเรื่องใดมากแต่สุดท้ายต้องภัยเพราะเรื่องนั้น" },
  { id: 7, emojis: "🐟 💀 ➡️ 👄 🗣️", answers: ["ปลาหมอตายเพราะปาก"], hint: "คนที่พูดจาไม่ระวังจนตัวเองต้องได้รับอันตรายหรือเดือดร้อน" },
  { id: 8, emojis: "📚 📚 🧔 🌊 💀", answers: ["ความรู้ท่วมหัวเอาตัวไม่รอด"], hint: "มีความรู้ความสามารถมากแต่เมื่อเจอวิกฤตกลับช่วยตัวเองไม่ได้" },
  { id: 9, emojis: "❤️ 🐮 🪢 ❤️ 👶 🪵", answers: ["รักวัวให้ผูกรักลูกให้ตี"], hint: "ถ้าจะรักวัวต้องผูกไว้ไม่ให้หนี ถ้าจะรักลูกต้องรู้จักอบรมสั่งสอน" },
  { id: 10, emojis: "🖐️ 📭 🐯 ➡️ 💎 💰", answers: ["จับเสือมือเปล่า"], hint: "การหาผลประโยชน์โดยตัวเองไม่ได้ลงทุนหรือลงแรงอะไรเลย" },
];

const TIME_LIMIT = 45;
const MAX_HINTS = 3;
const LB_KEY = "emojiquiz_leaderboard_v1";

// ปรับปรุงคำพูดระบบวิเคราะห์คะแนนใหม่ตามที่ขอครับ
const ROAST = (score) => {
  if (score >= 900) return "🏆 เทพเจ้าอีโมจิมาจุติ! กราบเบญจางคประดิษฐ์ คุณคือร่างอวตารของพจนานุกรมราชบัณฑิตยสถาน!";
  if (score >= 600) return "🔥 เก่งมาก! สมองไวระดับไฟลุก งานการไม่ทำ นั่งตีโจทย์อีโมจิใช่ไหมเนี่ย?";
  if (score >= 400) return "👍 ใช้ได้เลยนะเนี่ย! ฝีมือไม่ธรรมดา มีแววเซียนอีโมจิอยู่เหมือนกัน รอบหน้าท็อปฟอร์มแน่!";
  return "☕ พักเบรกไปจิบกาแฟแก้ง่วงสักนิด สูดหายใจลึกๆ แล้วค่อยกลับมาแก้มือใหม่รอบหน้านะครับ";
};

const ROAST_TITLE = (score) => {
  if (score >= 900) return "เทพเจ้าอีโมจิ";
  if (score >= 600) return "เซียนไฟลุก";
  if (score >= 400) return "ฝีมือไม่ธรรมดา";
  return "มือใหม่หัดทาย";
};

function normalize(str) {
  return str
    .replace(/[\s\u200b]+/g, "")
    .replace(/[^\u0E00-\u0E7Fa-zA-Z0-9]/g, "")
    .toLowerCase();
}

function loadLeaderboard() {
  try {
    const raw = localStorage.getItem(LB_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}

function saveLeaderboard(list) {
  try {
    localStorage.setItem(LB_KEY, JSON.stringify(list));
  } catch {
    /* storage unavailable; ignore */
  }
}

/* ---------- small visual atoms ---------- */

function StampBorderCard({ children, className = "" }) {
  return (
    <div
      className={
        "relative rounded-[28px] border-[3px] border-[#1B1F3B] bg-[#F0EEE9] shadow-[6px_6px_0_0_#1B1F3B] " +
        className
      }
      style={{
        backgroundImage:
          "radial-gradient(circle at 1px 1px, rgba(27,31,59,0.07) 1px, transparent 0)",
        backgroundSize: "14px 14px",
      }}
    >
      {children}
    </div>
  );
}

function InkButton({ children, onClick, disabled, variant = "primary", className = "", type = "button" }) {
  const styles = {
    primary:
      "bg-[#E8483C] text-[#F0EEE9] border-[#1B1F3B] hover:bg-[#d33d31] active:translate-y-[2px] active:shadow-[2px_2px_0_0_#1B1F3B]",
    gold:
      "bg-[#F4B942] text-[#1B1F3B] border-[#1B1F3B] hover:bg-[#e8ad34] active:translate-y-[2px] active:shadow-[2px_2px_0_0_#1B1F3B]",
    ghost:
      "bg-[#F0EEE9] text-[#1B1F3B] border-[#1B1F3B] hover:bg-[#fef0cf] active:translate-y-[2px] active:shadow-[2px_2px_0_0_#1B1F3B]",
    jade:
      "bg-[#3FA66A] text-[#F0EEE9] border-[#1B1F3B] hover:bg-[#379a5f] active:translate-y-[2px] active:shadow-[2px_2px_0_0_#1B1F3B]",
  };
  return (
    <button
      type={type}
      onClick={onClick}
      disabled={disabled}
      className={
        "px-6 py-3 rounded-2xl font-bold border-[3px] shadow-[4px_4px_0_0_#1B1F3B] transition-all duration-100 disabled:opacity-40 disabled:cursor-not-allowed disabled:active:translate-y-0 disabled:active:shadow-[4px_4px_0_0_#1B1F3B] " +
        styles[variant] +
        " " +
        className
      }
    >
      {children}
    </button>
  );
}

/* Confetti burst using pure CSS/SVG-driven divs */
function Confetti({ active }) {
  const pieces = useMemo(
    () =>
      Array.from({ length: 60 }, (_, i) => ({
        id: i,
        left: Math.random() * 100,
        delay: Math.random() * 0.4,
        duration: 1.8 + Math.random() * 1.4,
        rotate: Math.random() * 360,
        color: ["#E8483C", "#F4B942", "#3FA66A", "#1B1F3B", "#F0EEE9"][i % 5],
        size: 6 + Math.random() * 8,
        drift: (Math.random() - 0.5) * 200,
      })),
    [active]
  );

  if (!active) return null;
  return (
    <div className="fixed inset-0 z-[100] overflow-hidden pointer-events-none">
      {pieces.map((p) => (
        <span
          key={p.id}
          className="absolute top-[-20px] rounded-sm"
          style={{
            left: `${p.left}%`,
            width: p.size,
            height: p.size * 1.6,
            backgroundColor: p.color,
            border: "1.5px solid #1B1F3B",
            animation: `confettiFall ${p.duration}s ${p.delay}s ease-in forwards`,
            "--drift": `${p.drift}px`,
            "--rot": `${p.rotate}deg`,
          }}
        />
      ))}
    </div>
  );
}

function ProgressBar({ pct, danger }) {
  return (
    <div className="w-full h-4 rounded-full bg-[#1B1F3B]/10 border-2 border-[#1B1F3B] overflow-hidden">
      <div
        className={
          "h-full rounded-full transition-[width] duration-200 ease-linear " +
          (danger ? "bg-[#E8483C]" : "bg-[#F4B942]")
        }
        style={{ width: `${pct}%` }}
      />
    </div>
  );
}

function Toast({ message, show }) {
  return (
    <div
      className={
        "fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] transition-all duration-300 " +
        (show ? "opacity-100 translate-y-0" : "opacity-0 translate-y-4 pointer-events-none")
      }
    >
      <div className="bg-[#1B1F3B] text-[#F0EEE9] px-5 py-3 rounded-2xl border-2 border-[#F4B942] shadow-[4px_4px_0_0_#F4B942] font-bold flex items-center gap-2">
        <span>✅</span>
        {message}
      </div>
    </div>
  );
}

/* ---------- main app ---------- */

function EmojiQuiz() {
  const [screen, setScreen] = useState("welcome"); // welcome | quiz | result
  const [slackName, setSlackName] = useState("");
  const [nameError, setNameError] = useState("");

  const [qIndex, setQIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);

  const [timeLeft, setTimeLeft] = useState(TIME_LIMIT);
  const timerRef = useRef(null);
  const startRef = useRef(Date.now());

  const [input, setInput] = useState("");
  const [hintsLeft, setHintsLeft] = useState(MAX_HINTS);
  const [hintUsedThisQ, setHintUsedThisQ] = useState(false);
  const [hintText, setHintText] = useState("");

  const [feedback, setFeedback] = useState(null); // 'correct' | 'wrong' | null
  const [shake, setShake] = useState(false);
  const [lastPoints, setLastPoints] = useState(null);

  const [leaderboard, setLeaderboard] = useState([]);
  const [showAdmin, setShowAdmin] = useState(false);
  const [adminPass, setAdminPass] = useState("");
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [adminError, setAdminError] = useState("");

  const [toast, setToast] = useState({ show: false, message: "" });
  const [confettiActive, setConfettiActive] = useState(false);
  const [locked, setLocked] = useState(false);

  const inputRef = useRef(null);

  useEffect(() => {
    setLeaderboard(loadLeaderboard());
  }, []);

  const showToast = useCallback((message) => {
    setToast({ show: true, message });
    setTimeout(() => setToast({ show: false, message: "" }), 2200);
  }, []);

  /* ---- timer lifecycle ---- */
  const clearTimer = () => {
    if (timerRef.current) {
      clearInterval(timerRef.current);
      timerRef.current = null;
    }
  };

  const startTimer = useCallback(() => {
    clearTimer();
    startRef.current = Date.now();
    setTimeLeft(TIME_LIMIT);
    timerRef.current = setInterval(() => {
      const elapsed = (Date.now() - startRef.current) / 1000;
      const remain = Math.max(0, TIME_LIMIT - elapsed);
      setTimeLeft(remain);
      if (remain <= 0) {
        clearTimer();
        handleTimeout();
      }
    }, 100);
  }, []);

  useEffect(() => {
    if (screen === "quiz") {
      setInput("");
      setHintUsedThisQ(false);
      setHintText("");
      setFeedback(null);
      setLocked(false);
      startTimer();
      setTimeout(() => inputRef.current?.focus(), 50);
    }
    return clearTimer;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [screen, qIndex]);

  useEffect(() => clearTimer, []);

  const currentQ = QUESTIONS[qIndex];

  const advance = useCallback(() => {
    if (qIndex + 1 >= QUESTIONS.length) {
      finishGame();
    } else {
      setQIndex((i) => i + 1);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [qIndex, score, correctCount]);

  function handleTimeout() {
    if (locked) return;
    setLocked(true);
    setFeedback("wrong");
    setShake(true);
    setStreak(0);
    setLastPoints(0);
    setTimeout(() => {
      setShake(false);
      advance();
    }, 1100);
  }

  function handleHint() {
    if (hintsLeft <= 0 || hintUsedThisQ || locked) return;
    setHintText(currentQ.hint); 
    setHintUsedThisQ(true);
    setHintsLeft((h) => h - 1);
  }

  function handleSubmit(e) {
    e.preventDefault();
    if (locked || !input.trim()) return;
    setLocked(true);
    clearTimer();

    const userNorm = normalize(input);
    const isCorrect = currentQ.answers.some((a) => normalize(a) === userNorm);

    if (isCorrect) {
      let pts = 100; 
      setScore((s) => s + pts);
      setCorrectCount((c) => c + 1);
      setStreak((s) => {
        const next = s + 1;
        setBestStreak((b) => Math.max(b, next));
        return next;
      });
      setLastPoints(pts);
      setFeedback("correct");
      setTimeout(() => advance(), 1000);
    } else {
      setStreak(0);
      setLastPoints(0);
      setFeedback("wrong");
      setShake(true);
      setTimeout(() => {
        setShake(false);
        advance();
      }, 1100);
    }
  }

  /**************************************************************
   * จบเกม ยิงคอนเฟตตี้ฉลองให้ทุกคน และคำนวณเซฟบอร์ดแสดงผลทันที
   **************************************************************/
  function finishGame() {
    clearTimer();
    const entry = {
      name: slackName.trim() || "@ไม่ระบุชื่อ",
      score,
      correct: correctCount,
      timestamp: Date.now(),
    };
    const updated = [...leaderboard, entry].sort((a, b) => b.score - a.score);
    saveLeaderboard(updated);
    setLeaderboard(updated);
    setScreen("result");

    setConfettiActive(true);
    setTimeout(() => setConfettiActive(false), 3000);
  }

  function startGame() {
    const trimmed = slackName.trim();
    if (!trimmed) {
      setNameError("กรอกชื่อ Slack ก่อนนะ ไม่งั้นใครจะรู้ว่าใครเก่ง!");
      return;
    }
    setNameError("");
    setQIndex(0);
    setScore(0);
    setCorrectCount(0);
    setStreak(0);
    setBestStreak(0);
    setHintsLeft(MAX_HINTS);
    setScreen("quiz");
  }

  function playAgain() {
    setScreen("welcome");
  }

  const myRank = useMemo(() => {
    if (screen !== "result") return -1;
    return leaderboard.findIndex(
      (e) => e.name === (slackName.trim() || "@ไม่ระบุชื่อ") && e.score === score
    );
  }, [screen, leaderboard, slackName, score]);

  function copyToSlack() {
    const rankDisplay = myRank >= 0 ? myRank + 1 : "-";
    const text = `🧩 [Emoji Quiz เซียนขั้นสุด] 
👤 พนักงาน: ${slackName.trim() || "@ไม่ระบุชื่อ"}
🎯 คะแนนรวม: ${score} คะแนน (ถูก ${correctCount}/10 ข้อ)
👑 ตำแหน่ง: ${ROAST_TITLE(score)}
🏆 อันดับปัจจุบัน: อันดับที่ ${rankDisplay} บน Leaderboard!
แน่จริงก็เข้ามาล้มแชมป์ดิ: ${typeof window !== "undefined" ? window.location.href : "https://emoji-quiz.local"}`;

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard
        .writeText(text)
        .then(() => showToast("คัดลอกแล้ว!"))
        .catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }

  function fallbackCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      showToast("คัดลอกแล้ว!");
    } catch {
      showToast("คัดลอกไม่สำเร็จ ลองใหม่นะ");
    }
  }

  function handleAdminLogin(e) {
    e.preventDefault();
    if (adminPass === "DECEMBER") {
      setAdminUnlocked(true);
      setAdminError("");
    } else {
      setAdminError("รหัสผ่านไม่ถูกต้อง ❌");
    }
  }

  function resetAllData() {
    saveLeaderboard([]);
    setLeaderboard([]);
    showToast("ล้างข้อมูลทั้งหมดแล้ว!");
  }

  const top10 = leaderboard.slice(0, 10);
  const pct = (timeLeft / TIME_LIMIT) * 100;
  const danger = timeLeft <= 15;

  return (
    <div
      className="min-h-screen w-full flex flex-col items-center justify-start py-8 px-4 font-['Sarabun',sans-serif]"
      style={{
        background:
          "linear-gradient(180deg, #1B1F3B 0%, #23284a 100%)",
      }}
    >
      <style>{`
        .font-display { font-family: 'Kanit', sans-serif; }
        @keyframes confettiFall {
          0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
          100% { transform: translateY(110vh) translateX(var(--drift)) rotate(var(--rot)); opacity: 0.9; }
        }
        @keyframes shakeCard {
          0%, 100% { transform: translateX(0); }
          20% { transform: translateX(-10px) rotate(-1deg); }
          40% { transform: translateX(8px) rotate(1deg); }
          60% { transform: translateX(-6px) rotate(-0.5deg); }
          80% { transform: translateX(4px) rotate(0.5deg); }
        }
        .shake-anim { animation: shakeCard 0.5s ease-in-out; }
        @keyframes flashGreen {
          0% { background-color: rgba(63,166,106,0); }
          25% { background-color: rgba(63,166,106,0.35); }
          100% { background-color: rgba(63,166,106,0); }
        }
        @keyframes flashRed {
          0% { background-color: rgba(232,72,60,0); }
          25% { background-color: rgba(232,72,60,0.35); }
          100% { background-color: rgba(232,72,60,0); }
        }
        .flash-correct { animation: flashGreen 0.9s ease-out; }
        .flash-wrong { animation: flashRed 0.9s ease-out; }
        @keyframes popCheck {
          0% { transform: scale(0) rotate(-20deg); opacity: 0; }
          60% { transform: scale(1.3) rotate(8deg); opacity: 1; }
          100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .pop-check { animation: popCheck 0.45s cubic-bezier(.34,1.56,.64,1); }
        @keyframes stampDown {
          0% { transform: scale(2.6) rotate(-8deg); opacity: 0; }
          60% { transform: scale(0.92) rotate(2deg); opacity: 1; }
          80% { transform: scale(1.05) rotate(-1deg); }
          100% { transform: scale(1) rotate(-2deg); opacity: 1; }
        }
        .stamp-anim { animation: stampDown 0.6s cubic-bezier(.2,.8,.3,1.2); }
        @keyframes flicker {
          0%, 100% { transform: scale(1) rotate(-2deg); }
          50% { transform: scale(1.06) rotate(2deg); }
        }
        .flame-flicker { animation: flicker 0.6s ease-in-out infinite; display:inline-block; }
        input:focus { outline: none; }
        ::selection { background: #F4B942; }
      `}</style>

      <Confetti active={confettiActive} />
      <Toast show={toast.show} message={toast.message} />

      <header className="w-full max-w-2xl flex items-center justify-between mb-6 px-2">
        <div className="font-display font-extrabold text-[#F4B942] text-lg sm:text-xl tracking-wide flex items-center gap-2">
          <span className="text-2xl">🧩</span> Emoji Quiz เซียนขั้นสุด
        </div>
        {screen !== "quiz" && (
          <button
            onClick={() => setShowAdmin((v) => !v)}
            className="text-2xl hover:scale-110 active:scale-95 transition-all duration-150 p-1"
            title="แผงควบคุมแอดมิน"
          >
            🔑
          </button>
        )}
      </header>

      {/* ================= WELCOME ================= */}
      {screen === "welcome" && (
        <StampBorderCard className="w-full max-w-2xl p-6 sm:p-10">
          <div className="text-center mb-6">
            <div className="text-5xl mb-2">🧠💥</div>
            <h1 className="font-display font-extrabold text-2xl sm:text-3xl text-[#1B1F3B]">
              ทายสำนวนไทยจากอีโมจิ
            </h1>
            <p className="text-[#1B1F3B]/70 mt-2 font-semibold">
              10 ข้อ • 45 วินาที/ข้อ • ใบ้ได้ 3 ครั้ง • คะแนนเต็ม 1000
            </p>
          </div>

          <div className="mb-5">
            <label className="block font-bold text-[#1B1F3B] mb-2">
              ชื่อ Slack ของคุณ
            </label>
            <input
              value={slackName}
              onChange={(e) => {
                setSlackName(e.target.value);
                setNameError("");
              }}
              onKeyDown={(e) => e.key === "Enter" && startGame()}
              placeholder="@john.w"
              className="w-full px-4 py-3 rounded-2xl border-[3px] border-[#1B1F3B] bg-white text-[#1B1F3B] font-semibold placeholder:text-[#1B1F3B]/30 focus:ring-4 focus:ring-[#F4B942]/50"
            />
            {nameError && (
              <p className="text-[#E8483C] font-bold text-sm mt-2">⚠️ {nameError}</p>
            )}
          </div>

          <div className="bg-[#1B1F3B]/5 border-2 border-[#1B1F3B]/20 rounded-2xl p-4 mb-6 text-sm text-[#1B1F3B]/80 space-y-1.5">
            <p className="font-bold text-[#1B1F3B] mb-1">📜 กฎกติกา</p>
            <p>🎯 ตอบถูกรับไปเลย 100 คะแนนเต็มต่อข้อ</p>
            <p>🔥 ตอบถูกต่อกัน ได้ติดสตรีคคอมโบ</p>
            <p>💡 ขอคำใบ้เพื่อดูความหมายของสำนวนได้ 3 ครั้งทั้งเกม</p>
            <p>🏆 เล่นจบรับเอฟเฟกต์พลุฉลองจัดเต็มแน่นอน!</p>
          </div>

          <InkButton variant="primary" onClick={startGame} className="w-full text-lg">
            🚀 เริ่มเกม
          </InkButton>
        </StampBorderCard>
      )}

      {/* ================= QUIZ ================= */}
      {screen === "quiz" && currentQ && (
        <StampBorderCard
          className={
            "w-full max-w-2xl p-6 sm:p-8 relative overflow-hidden " +
            (shake ? "shake-anim " : "") +
            (feedback === "correct" ? "flash-correct " : "") +
            (feedback === "wrong" ? "flash-wrong " : "")
          }
        >
          {/* top row: question count + streak + score */}
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <div className="font-display font-bold text-[#1B1F3B] bg-[#F4B942] px-3 py-1 rounded-xl border-2 border-[#1B1F3B] text-sm">
              ข้อ {qIndex + 1}/10
            </div>
            <div className="flex items-center gap-3">
              {streak > 1 && (
                <div className="flame-flicker font-display font-bold text-[#E8483C] text-sm">
                  🔥 {streak}x Streak!
                </div>
              )}
              <div className="font-display font-bold text-[#1B1F3B] text-sm">
                คะแนน: <span className="text-[#E8483C]">{score}</span>
              </div>
            </div>
          </div>

          {/* timer bar */}
          <div className="mb-6">
            <ProgressBar pct={pct} danger={danger} />
            <div className="text-right text-xs font-bold text-[#1B1F3B]/60 mt-1">
              ⏳ {Math.ceil(timeLeft)} วิ
            </div>
          </div>

          {/* emoji display */}
          <div className="bg-white border-[3px] border-[#1B1F3B] rounded-3xl py-10 px-4 mb-2 flex items-center justify-center min-h-[140px] relative">
            <div className="text-4xl sm:text-5xl tracking-wide text-center select-none">
              {currentQ.emojis}
            </div>

            {feedback === "correct" && (
              <div className="absolute inset-0 flex items-center justify-center bg-[#3FA66A]/10 rounded-3xl">
                <div className="pop-check text-7xl">✅</div>
              </div>
            )}
            {feedback === "wrong" && (
              <div className="absolute inset-0 flex items-center justify-center bg-[#E8483C]/10 rounded-3xl">
                <div className="text-6xl">❌</div>
              </div>
            )}
          </div>

          {lastPoints !== null && feedback && (
            <p
              className={
                "text-center font-display font-bold mb-3 " +
                (feedback === "correct" ? "text-[#3FA66A]" : "text-[#E8483C]")
              }
            >
              {feedback === "correct" ? `+${lastPoints} คะแนน!` : "พลาด! ไป 0 คะแนน"}
            </p>
          )}

          {/* hint */}
          {hintText && (
            <div className="bg-[#F4B942]/20 border-2 border-dashed border-[#F4B942] rounded-2xl px-4 py-3 mb-4 text-center">
              <p className="font-display text-[#1B1F3B] font-bold text-sm sm:text-base leading-relaxed">
                💡 ความหมาย: {hintText}
              </p>
            </div>
          )}

          <form onSubmit={handleSubmit} className="space-y-3">
            <input
              ref={inputRef}
              value={input}
              onChange={(e) => setInput(e.target.value)}
              disabled={locked}
              placeholder="พิมพ์คำตอบสำนวนไทย..."
              className="w-full px-4 py-3 rounded-2xl border-[3px] border-[#1B1F3B] bg-white text-[#1B1F3B] font-semibold placeholder:text-[#1B1F3B]/30 focus:ring-4 focus:ring-[#F4B942]/50 disabled:opacity-60"
            />
            <div className="flex gap-3">
              <InkButton
                variant="gold"
                type="button"
                onClick={handleHint}
                disabled={hintsLeft <= 0 || hintUsedThisQ || locked}
                className="flex-shrink-0"
              >
                💡 ขอคำใบ้ ({hintsLeft})
              </InkButton>
              <InkButton variant="primary" type="submit" disabled={locked || !input.trim()} className="flex-1">
                ส่งคำตอบ ✏️
              </InkButton>
            </div>
          </form>
        </StampBorderCard>
      )}

      {/* ================= RESULT ================= */}
      {screen === "result" && (
        <StampBorderCard className="w-full max-w-2xl p-6 sm:p-10">
          <div className="text-center mb-6">
            <div className="stamp-anim inline-block">
              <div className="font-display font-extrabold text-5xl sm:text-6xl text-[#E8483C] border-[5px] border-[#E8483C] rounded-2xl px-6 py-3 rotate-[-2deg] inline-block">
                {score}
              </div>
            </div>
            <p className="text-[#1B1F3B]/70 font-bold mt-3">
              คะแนนรวม • ตอบถูก {correctCount}/10 ข้อ • สตรีคสูงสุด 🔥{bestStreak}x
            </p>
          </div>

          <div className="bg-[#1B1F3B] text-[#F0EEE9] rounded-2xl p-5 mb-6 text-center font-display font-semibold leading-relaxed border-2 border-[#F4B942]">
            {ROAST(score)}
          </div>

          <div className="flex flex-col sm:flex-row gap-3 mb-8">
            <InkButton variant="jade" onClick={copyToSlack} className="flex-1">
              คัดลอกคะแนนไปขิงใน Slack 💬
            </InkButton>
            <InkButton variant="ghost" onClick={playAgain} className="flex-1">
              🔁 เล่นอีกครั้ง
            </InkButton>
          </div>

          {/* ตาราง Top 10 ลีดเดอร์บอร์ด แสดงแบบเรียลไทม์หลังจบเกมทันที */}
          <div>
            <h2 className="font-display font-bold text-[#1B1F3B] text-lg mb-3 flex items-center gap-2">
              🏆 Top 10 Leaderboard ประจำออฟฟิศ
            </h2>
            <div className="border-2 border-[#1B1F3B] rounded-2xl overflow-hidden shadow-sm">
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-[#1B1F3B] text-[#F0EEE9] font-display">
                    <th className="py-2 px-3 text-left w-12">#</th>
                    <th className="py-2 px-3 text-left">ชื่อ</th>
                    <th className="py-2 px-3 text-right">คะแนน</th>
                    <th className="py-2 px-3 text-right hidden sm:table-cell">ถูก</th>
                  </tr>
                </thead>
                <tbody>
                  {top10.length === 0 && (
                    <tr>
                      <td colSpan={4} className="py-4 text-center text-[#1B1F3B]/50 font-semibold">
                        ยังไม่มีผู้เล่น เป็นคนแรกเลย!
                      </td>
                    </tr>
                  )}
                  {top10.map((e, i) => (
                    <tr
                      key={e.timestamp + e.name}
                      className={
                        "border-t border-[#1B1F3B]/15 " +
                        (i === myRank && e.timestamp === top10[myRank]?.timestamp
                          ? "bg-[#F4B942]/30 font-bold"
                          : i % 2 === 0
                          ? "bg-white"
                          : "bg-[#1B1F3B]/5")
                      }
                    >
                      <td className="py-2 px-3 text-[#1B1F3B] font-display font-bold">
                        {i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : i + 1}
                      </td>
                      <td className="py-2 px-3 text-[#1B1F3B] truncate max-w-[160px]">{e.name}</td>
                      <td className="py-2 px-3 text-right text-[#E8483C] font-bold">{e.score}</td>
                      <td className="py-2 px-3 text-right text-[#1B1F3B]/70 hidden sm:table-cell">
                        {e.correct}/10
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </StampBorderCard>
      )}

      {/* ================= ADMIN PANEL (PASSWORD LOCKED: DECEMBER) ================= */}
      {showAdmin && (
        <div className="fixed inset-0 bg-black/60 z-[150] flex items-center justify-center p-4">
          <StampBorderCard className="w-full max-w-3xl max-h-[85vh] overflow-y-auto p-6 sm:p-8">
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-display font-extrabold text-xl text-[#1B1F3B] flex items-center gap-2">
                🔒 แผงควบคุมแอดมิน
              </h2>
              <button
                onClick={() => {
                  setShowAdmin(false);
                  setAdminUnlocked(false);
                  setAdminPass("");
                  setAdminError("");
                }}
                className="text-[#1B1F3B] font-bold text-2xl leading-none hover:text-[#E8483C]"
              >
                ✕
              </button>
            </div>

            {!adminUnlocked ? (
              <form onSubmit={handleAdminLogin} className="space-y-4">
                <p className="text-[#1B1F3B]/70 font-semibold text-sm">
                  พื้นที่นี้จำกัดสิทธิ์เฉพาะแอดมินกิจกรรมเท่านั้น กรุณากรอกรหัสผ่านเพื่อเข้าใช้งาน:
                </p>
                <input
                  type="password"
                  value={adminPass}
                  onChange={(e) => {
                    setAdminPass(e.target.value);
                    setAdminError("");
                  }}
                  placeholder="กรอกรหัสผ่านแอดมิน..."
                  className="w-full px-4 py-3 rounded-2xl border-[3px] border-[#1B1F3B] bg-white text-[#1B1F3B] font-semibold focus:ring-4 focus:ring-[#F4B942]/50"
                />
                {adminError && (
                  <p className="text-[#E8483C] font-bold text-sm">⚠️ {adminError}</p>
                )}
                <InkButton variant="primary" type="submit" className="w-full">
                  เข้าสู่ระบบแอดมิน
                </InkButton>
              </form>
            ) : (
              <>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-5">
                  <div className="bg-[#1B1F3B] text-[#F0EEE9] rounded-2xl p-4 text-center">
                    <p className="text-2xl font-display font-extrabold text-[#F4B942]">
                      {leaderboard.length}
                    </p>
                    <p className="text-xs font-semibold mt-1">ผู้เล่นทั้งหมด</p>
                  </div>
                  <div className="bg-[#1B1F3B] text-[#F0EEE9] rounded-2xl p-4 text-center">
                    <p className="text-2xl font-display font-extrabold text-[#F4B942]">
                      {leaderboard.length
                        ? Math.round(
                            leaderboard.reduce((s, e) => s + e.score, 0) / leaderboard.length
                          )
                        : 0}
                    </p>
                    <p className="text-xs font-semibold mt-1">คะแนนเฉลี่ย</p>
                  </div>
                  <div className="bg-[#1B1F3B] text-[#F0EEE9] rounded-2xl p-4 text-center">
                    <p className="text-2xl font-display font-extrabold text-[#F4B942]">
                      {leaderboard.length ? Math.max(...leaderboard.map((e) => e.score)) : 0}
                    </p>
                    <p className="text-xs font-semibold mt-1">คะแนนสูงสุด</p>
                  </div>
                </div>

                <div className="border-2 border-[#1B1F3B] rounded-2xl overflow-hidden mb-5">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-[#1B1F3B] text-[#F0EEE9] font-display">
                        <th className="py-2 px-3 text-left">ชื่อ</th>
                        <th className="py-2 px-3 text-right">คะแนน</th>
                        <th className="py-2 px-3 text-right">ถูก</th>
                        <th className="py-2 px-3 text-right">เวลา</th>
                      </tr>
                    </thead>
                    <tbody>
                      {leaderboard.length === 0 && (
                        <tr>
                          <td colSpan={4} className="py-4 text-center text-[#1B1F3B]/50 font-semibold">
                            ยังไม่มีข้อมูลผู้เล่น
                          </td>
                        </tr>
                      )}
                      {[...leaderboard]
                        .sort((a, b) => b.timestamp - a.timestamp)
                        .map((e) => (
                          <tr key={e.timestamp + e.name} className="border-t border-[#1B1F3B]/15">
                            <td className="py-2 px-3 text-[#1B1F3B] truncate max-w-[140px]">{e.name}</td>
                            <td className="py-2 px-3 text-right text-[#E8483C] font-bold">{e.score}</td>
                            <td className="py-2 px-3 text-right text-[#1B1F3B]/70">{e.correct}/10</td>
                            <td className="py-2 px-3 text-right text-[#1B1F3B]/50 text-xs">
                              {new Date(e.timestamp).toLocaleString("th-TH", {
                                dateStyle: "short",
                                timeStyle: "short",
                              })}
                            </td>
                          </tr>
                        ))}
                    </tbody>
                  </table>
                </div>

                <InkButton
                  variant="primary"
                  onClick={() => {
                    if (window.confirm("ยืนยันการล้างข้อมูลผู้เล่นทั้งหมด? การกระทำนี้ไม่สามารถย้อนกลับได้")) {
                      resetAllData();
                    }
                  }}
                  className="w-full"
                >
                  🗑️ Reset All Data
                </InkButton>
              </>
            )}
          </StampBorderCard>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<EmojiQuiz />);
</script>
</body>
</html>
